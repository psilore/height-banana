name: 🧪 Test Suite

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version to use'
        required: false
        type: string
        default: '3.22.0'
    outputs:
      coverage:
        description: 'Test coverage percentage'
        value: ${{ jobs.test.outputs.coverage }}

jobs:
  test:
    name: Run Tests
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔨 Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: 🧪 Run unit tests
        run: flutter test test/ --coverage --reporter expanded

      - name: 🎭 Run widget tests
        run: flutter test test/widget/ --reporter expanded

      - name: 📊 Generate coverage report
        id: coverage
        run: |
          # Use awk to calculate coverage directly from lcov.info without depending on lcov being installed on the runner
          COVERAGE=$(awk -F':' '/^LF/{lf+=$2} /^LH/{lh+=$2} END{if(lf>0) printf "%.1f", (lh/lf)*100; else print "0.0"}' coverage/lcov.info)
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "✅ Test coverage: $COVERAGE%"

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage/lcov.info
          flags: unittests
          name: flutter-coverage

      - name: 💬 Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.percentage }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Test Coverage Report\n\n**Coverage:** ${coverage}%\n\n✅ All tests passed!`
            });

      - name: ✅ Test results summary
        if: always()
        run: |
          echo "### 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Unit tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "✅ Widget tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "📊 Coverage: ${{ steps.coverage.outputs.percentage }}%" >> $GITHUB_STEP_SUMMARY
