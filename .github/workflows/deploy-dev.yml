name: 🚀 Development Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
  push:
    branches:
      - develop

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 'any'

jobs:
  # Run all quality checks
  quality:
    name: 🔍 Quality Checks
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/quality.yml
    with:
      flutter-version: 'any'

  # Run test suite
  test:
    name: 🧪 Test Suite
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/test.yml
    with:
      flutter-version: 'any'

  # Build development APK
  build:
    name: 📦 Build Development
    permissions:
      contents: read
    needs: [quality, test]
    uses: ./.github/workflows/build.yml
    with:
      flutter-version: 'any'
      build-number: ${{ github.run_number }}
      environment: 'development'

  # Deploy to development environment
  deploy-dev:
    name: 🚢 Deploy to Development
    permissions:
      contents: read
      pull-requests: write
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://dev.height-banana.app
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apk-development-${{ github.run_number }}

      - name: 🚀 Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_DEV }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers-dev
          file: app-debug.apk
          releaseNotes: |
            🚀 Development Build ${{ github.run_number }}
            
            📝 Changes:
            ${{ github.event.head_commit.message }}
            
            🔗 Branch: ${{ github.ref_name }}
            👤 Author: ${{ github.actor }}

      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Development Deployment

              ✅ Successfully deployed to **Development** environment!

              **Build:** ${{ github.run_number }}
              **Environment:** Development
              **Download:** Firebase App Distribution (testers-dev group)

              📱 Install the app from Firebase App Distribution to test this PR.`
            });

  # Notify on success/failure
  notify:
    name: 📢 Notify Results
    permissions:
      contents: read
    needs: [quality, test, build, deploy-dev]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: ✅ Success notification
        if: ${{ needs.deploy-dev.result == 'success' }}
        run: |
          echo "### ✅ Development Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build ${{ github.run_number }} deployed to development environment" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failure notification
        if: ${{ needs.deploy-dev.result == 'failure' }}
        run: |
          echo "### ❌ Development Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check logs for details" >> $GITHUB_STEP_SUMMARY
