name: 🎉 Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  release-please:
    name: 📝 Create Release PR
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
      pr-number: ${{ steps.release.outputs.pr }}
    
    steps:
      - name: 🎉 Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5

      - name: 📋 Release Info
        if: steps.release.outputs.release_created
        run: |
          echo "### 🎉 Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release PR:** #${{ steps.release.outputs.pr }}" >> $GITHUB_STEP_SUMMARY

  # Trigger production deployment if release was created
  deploy-production:
    name: 🚀 Production Deployment
    needs: release-please
    if: needs.release-please.outputs.release-created == 'true'
    uses: ./.github/workflows/deploy-prod.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      tag-name: ${{ needs.release-please.outputs.tag-name }}
    secrets: inherit
