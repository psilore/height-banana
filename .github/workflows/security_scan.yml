name: Security Scanning

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'
          # CodeQL doesn't directly support Dart, but we can scan for general patterns
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  dart-security-check:
    name: Dart Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Check for known vulnerabilities
        run: |
          flutter pub outdated --json > outdated.json || true
          if [ -f outdated.json ]; then
            echo "Checking for security updates..."
            cat outdated.json
          fi

      - name: Verify no secrets in code
        run: |
          echo "Checking for common secret patterns..."
          ! grep -rE "(firebase_options\.dart|google-services\.json|GoogleService-Info\.plist)" lib/ || {
            echo "Warning: Firebase config files should not be committed"
            exit 1
          }
          ! grep -rE "(api[_-]?key|secret|password|token).*[:=].*['\"][A-Za-z0-9]{20,}['\"]" lib/ || {
            echo "Warning: Potential hardcoded secrets detected"
            exit 1
          }

  security-report:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis, dart-security-check, secret-scanning]
    if: always()

    steps:
      - name: Security Check Summary
        run: |
          echo "### Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql-analysis.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dart Security: ${{ needs.dart-security-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning: ${{ needs.secret-scanning.result }}" >> $GITHUB_STEP_SUMMARY
