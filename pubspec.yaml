name: height_banana
description: A Flutter archery training analytics app with computer vision for target scoring, session tracking, and performance analysis.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.4.1

  # Local Storage & Offline Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Computer Vision & ML
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_object_detection: ^0.15.1

  # Camera & Images
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  image: ^4.2.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI & Charts
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # Utilities
  path_provider: ^2.1.3
  uuid: ^4.4.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Linting & Analysis
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.4
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/icons/
    - assets/models/

  # Fonts (optional - can customize later)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
